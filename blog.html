\",\"$7\",null,{\"name\":\"Next.Metadata\",\"children\":\"$@c\"}]}]}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}],false]],\"m\":\"$undefined\",\"G\":[\"$d\",[]],\"S\":true}\n"])</script><script>self.__next_f.push([1,"e:I[11997,[\"/_next/static/chunks/58689c96b0676c41.js\",\"/_next/static/chunks/13bdceb0db9ac3ad.js\",\"/_next/static/chunks/3c86dd9086b2f598.js\"],\"default\"]\nf:T9ff,"])</script><script>self.__next_f.push([1,"\nFor design patterns, I usually point people to [Refactoring.Guru: Design Patterns](https://refactoring.guru/design-patterns). Here is a quick guide to what you get there and when it helps.\n\n## What are design patterns?\n\nDesign patterns are **reusable solutions to common problems** in software design. They are not ready-made code you copy-paste; they are **templates or blueprints** you adapt to your context. Using them helps you write code that is easier to maintain, extend, and discuss with others.\n\nPatterns come from real-world use. The “Gang of Four” (GoF) book documented 23 classic patterns; many resources, including Refactoring.Guru, build on that and explain them in a clear, example-driven way.\n\n## What you’ll find on Refactoring.Guru\n\nThe site covers **22 classic design patterns**, grouped by intent:\n\n1. **Creational patterns**: how objects are created and who creates them. Examples: Factory Method, Abstract Factory, Singleton, Builder, Prototype.\n2. **Structural patterns**: how classes and objects are combined into larger structures. Examples: Adapter, Bridge, Composite, Decorator, Facade, Flyweight, Proxy.\n3. **Behavioral patterns**: how objects interact and how responsibilities are assigned. Examples: Chain of Responsibility, Command, Iterator, Mediator, Memento, Observer, State, Strategy, Template Method, Visitor.\n\nFor each pattern you typically get: intent, structure (e.g. UML), example code, pros and cons, and when to use it. The explanations are in plain language and avoid unnecessary jargon.\n\n## When are patterns useful?\n\n- **Recurring problems:** When you keep solving the same kind of design problem (e.g. “I need to add new behavior without changing existing code”), a pattern might fit.\n- **Communication:** Patterns give you a **shared vocabulary** (e.g. “we’ll use a Strategy here”) so the team can reason about design quickly.\n- **Guidance:** They suggest a structure and trade-offs instead of inventing everything from scratch.\n\nPatterns are not mandatory. Use them when they clearly improve clarity or flexibility; avoid forcing them where a simple solution is enough.\n\n## Why Refactoring.Guru\n\nRefactoring.Guru uses a **consistent format** with diagrams, multi-language snippets, intent, and trade-offs for each pattern. It is good for learning the idea first, then applying it in your own stack (TypeScript, Swift, Kotlin, and more). The Refactoring and SOLID sections also pair well with patterns.\n\n**Link:** [Refactoring.Guru – Design Patterns](https://refactoring.guru/design-patterns)\n"])</script><script>self.__next_f.push([1,"10:T1419,"])</script><script>self.__next_f.push([1,"\nHybrid auth with **OAuth 2.0**: short-lived **JWT access tokens** (RS256) plus opaque **refresh tokens** you can revoke in the database. API checks stay fast; sessions can still be killed when needed.\n\n## 1. Architecture overview\n\nWe use two kinds of tokens so that **speed** (no DB on every request) and **security** (ability to revoke sessions) are both satisfied.\n\n| Component | Technology | Role | Main point |\n| :--- | :--- | :--- | :--- |\n| **Access Token** | JWT (RS256) | Presented when calling APIs | **Stateless**: verified by signature only, no DB lookup |\n| **Refresh Token** | Opaque string | Used to obtain a new access token | **Revocable**: stored in DB; we can invalidate it anytime |\n| **Server** | express-oauth-server | Implements OAuth 2.0 flows and token handling | Standard behavior; we customize the model (see below) |\n| **Database** | PostgreSQL/Prisma | Stores users and refresh tokens | Single source of truth for long-lived sessions |\n\n**Why RS256?** We sign JWTs with a **private key** and verify with a **public key**. That allows verification without sharing the signing secret (e.g. multiple services can verify tokens with only the public key). RS256 is a good fit when you have a central auth service that issues tokens and other services that only verify them.\n\n## 2. Why two tokens?\n\n### Access token (short-lived, stateless)\n\n- **Format:** JWT (claims like `sub`, `exp`, `scope`, etc.).\n- **Signing:** RS256 with a private key; servers verify with the public key.\n- **Benefit:** No database call on each API request. Validation is a cryptographic check only.\n- **Lifetime:** Short (e.g. 15 minutes to 1 hour). Limits damage if the token is leaked.\n\n### Refresh token (long-lived, revocable)\n\n- **Format:** Opaque string (random, stored in DB).\n- **Storage:** Saved in the database and linked to the user (and optionally client/session).\n- **Benefit:** When we revoke a session (logout, compromise, password change), we delete or invalidate the refresh token. The user can no longer get new access tokens.\n- **Lifetime:** Long (e.g. days or weeks). Only used occasionally to get a new access token.\n\nSo: **access token = fast, stateless, short-lived**; **refresh token = revocable, long-lived, stored**.\n\n## 3. Supported login flows\n\n### 3.1. Password grant (username + password sign-in)\n\n- **Endpoint:** `POST /v1/signin` (or equivalent).\n- **Flow:** Client sends client ID/secret (e.g. in Basic Auth header) and username/password (e.g. in JSON body). Server validates credentials, creates access + refresh tokens, returns both.\n- **Use case:** First-party apps (e.g. your own web or mobile app) where the user types a password. We implemented a custom handler here to fix a library bug and to control exactly how tokens are issued.\n\n### 3.2. Authorization code grant\n\n- **Endpoint:** `GET /v1/oauth/authorize` (and token endpoint for exchanging the code).\n- **Flow:** User is redirected to the auth server, logs in, and approves access. The server redirects back with a one-time **authorization code**. The client exchanges the code (with client secret) for access and refresh tokens.\n- **Use case:** Third-party or public clients (e.g. another company’s app) that need limited access to a user’s data. The secret never goes to the browser; the code is one-time use.\n\n## 4. Key logic in the OAuth model\n\nWe plug custom logic into the OAuth library via a **model** (e.g. `oauth.model.ts`). Main responsibilities:\n\n| Function | Responsibility |\n| :--- | :--- |\n| **`generateAccessToken`** | Create a JWT with the right claims and sign it with the **private key** (RS256). |\n| **`getAccessToken`** | **Verify** the JWT signature with the **public key** and return the token object. No database access. |\n| **`saveToken`** | Persist **only the refresh token** (and metadata) in the DB. The access token is not stored. |\n| **`getRefreshToken`** | Load the refresh token from the DB (e.g. to validate and rotate it). |\n| **`revokeToken`** | Delete or mark the refresh token as invalid in the DB. |\n| **`getUser`** | Validate username/password (or other credentials) and return the user object. |\n\nThis keeps **JWT creation and verification** in one place and **refresh token lifecycle** in the database.\n\n## 5. Security considerations\n\n- **Access token:** Prefer short expiry. Store in memory or a short-lived cookie; avoid long-term storage in localStorage if XSS is a concern.\n- **Refresh token:** Store in DB; send over HTTPS only. Optionally bind to client or IP; rotate on use (issue a new refresh token and invalidate the old one).\n- **Keys:** Keep the RS256 private key only on the auth server; distribute the public key to services that verify tokens. Rotate keys with a clear strategy (e.g. support two public keys during transition).\n\n## 6. Wrap-up\n\nUsing **JWT (RS256)** for access tokens and **opaque, stored refresh tokens** gives a hybrid auth system that is fast (stateless verification), standards-based (OAuth 2.0), and secure (revocation and short-lived access). Customizing the OAuth model lets you align token format, storage, and revocation with your product and security requirements.\n"])</script><script>self.__next_f.push([1,"11:Ta3c,"])</script><script>self.__next_f.push([1,"\nThis site uses App Router, SSG, Markdown content, and static export to GitHub Pages. The setup stays intentionally small, so publishing a new post is routine and low effort.\n\n## Core stack\n\n- **Framework:** Next.js (App Router) with React and TypeScript.\n- **Rendering:** Static Site Generation (SSG). Pages are built at build time; no runtime server needed for content.\n- **Content:** Markdown files in `public/content/` (posts in `posts/`, intro in `intro.md`). Front matter (YAML) holds metadata (title, date, excerpt, tags). Content is read at build time via the filesystem and parsed with `gray-matter`.\n- **Styling:** Tailwind CSS plus a global CSS file for layout, header, footer, and blog-specific styles (sidebar, prose, minimap).\n- **Deployment:** Static export (e.g. GitHub Pages). No Node server required.\n\n## Structure and layout\n\n- **Home:** Single column: header, intro (from `intro.md`), list of recent posts, footer. Max width 42rem; padding aligned on left and right.\n- **Blog:** Two-level layout. Blog index shows the latest post; post list lives in a sidebar (desktop) or is reachable via navigation. Each post has its own route `/blog/[slug]`.\n- **Header:** Sticky, shared across home and blog. Navigation items (Home, Blog, Systems) and optional hamburger menu for small screens. When the hamburger is off, nav is centered on mobile.\n- **Footer:** Same on all pages: links (Stack Overflow, GitHub, view source), then copyright.\n\n## Data and content flow\n\n- **Posts:** Metadata (slug, title, date, excerpt, tags) is read from Markdown front matter. Full post content is loaded by slug when rendering a post page. Posts are sorted by date (newest first).\n- **Intro:** Home intro comes from `public/content/intro.md` (title + body). Optional paragraphs are split by double newline and rendered as separate paragraphs.\n- **Table of contents:** Headings are extracted from post Markdown (e.g. with a utility) to build an on-page minimap for long articles.\n\n## Performance and optimization\n\n- **Static generation:** All post pages are pre-rendered at build time via `generateStaticParams`, so first load is fast and no content API is needed at runtime.\n- **Images:** Next.js `Image` is used where needed (e.g. favicon in the header) for optimization.\n- **Fonts:** Google fonts (e.g. Source Sans 3, Source Serif 4) are loaded via `next/font` with `display: swap` to avoid layout shift.\n\n## Summary\n\nThe blog is a static Next.js app. Markdown is the source of truth, pages are pre-rendered, and shared layout keeps the UI consistent. The codebase stays simple and easy to extend with more posts or pages.\n"])</script><script>self.__next_f.push([1,"5:[\"$\",\"$7\",null,{\"fallback\":null,\"children\":[\"$\",\"$Le\",null,{\"posts\":[{\"slug\":\"design-patterns-resource\",\"title\":\"Design patterns resource I keep sending people\",\"date\":\"2025-12-12T00:00:00.000Z\",\"excerpt\":\"Refactoring.Guru in short: what design patterns are, how the site groups them, and when they are actually worth using.\",\"tags\":[\"design-patterns\",\"Docs\"],\"featured\":false,\"content\":\"$f\"},{\"slug\":\"mastering-oauth2-jwt\",\"title\":\"OAuth 2.0 and JWT (RS256): a hybrid auth setup that stays fast and revocable\",\"date\":\"2025-12-11T00:00:00.000Z\",\"excerpt\":\"How we pair short-lived JWT access tokens with opaque refresh tokens so API checks stay cheap and sessions can still be killed.\",\"tags\":[\"OAuth2\",\"Security\",\"JWT\",\"Backend\",\"Architecture\"],\"featured\":false,\"content\":\"$10\"},{\"slug\":\"ne
