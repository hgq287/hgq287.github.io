<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="420" viewBox="0 0 1480 420" role="img" aria-label="Cloud Armor, CDN, and Cloud Run defense layers">
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .title { font: 700 28px Inter, "Segoe UI", Helvetica, Arial, sans-serif; fill: #1f2937; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .armor { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; }
      .cdn { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; }
      .run { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; }
      .deny { fill: #fff1f2; stroke: #fb7185; stroke-width: 2; }
      .txt { font: 600 18px Inter, "Segoe UI", Helvetica, Arial, sans-serif; fill: #1f2937; }
      .small { font: 500 14px Inter, "Segoe UI", Helvetica, Arial, sans-serif; fill: #475569; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#ah); }
      .denyLine { stroke: #fb7185; stroke-width: 2.5; fill: none; marker-end: url(#dh); }
    </style>
    <marker id="ah" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#64748b" />
    </marker>
    <marker id="dh" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#fb7185" />
    </marker>
  </defs>

  <rect class="bg" width="1480" height="420" rx="18" />
  <text class="title" x="40" y="48">Cloud Run cost defense at the edge</text>

  <rect class="box" x="40" y="150" width="180" height="90" rx="12" />
  <text class="txt" x="70" y="192">Clients / bots</text>
  <text class="small" x="78" y="218">public traffic</text>

  <rect class="box" x="280" y="150" width="200" height="90" rx="12" />
  <text class="txt" x="305" y="192">HTTPS load</text>
  <text class="txt" x="325" y="218">balancer</text>

  <rect class="armor" x="540" y="150" width="190" height="90" rx="12" />
  <text class="txt" x="575" y="192">Cloud Armor</text>
  <text class="small" x="575" y="218">path deny rules</text>

  <rect class="cdn" x="790" y="150" width="180" height="90" rx="12" />
  <text class="txt" x="835" y="192">Cloud CDN</text>
  <text class="small" x="812" y="218">negative cache</text>

  <rect class="run" x="1040" y="150" width="200" height="90" rx="12" />
  <text class="txt" x="1085" y="192">Serverless NEG</text>
  <text class="txt" x="1095" y="218">Cloud Run</text>

  <rect class="deny" x="540" y="300" width="190" height="70" rx="12" />
  <text class="txt" x="585" y="342">Deny 403</text>

  <path class="line" d="M220 195 H275" />
  <path class="line" d="M480 195 H535" />
  <path class="line" d="M730 195 H785" />
  <path class="line" d="M970 195 H1035" />
  <path class="denyLine" d="M635 240 V295" />

  <text class="small" x="40" y="390">Denied probes never reach Cloud Run. Cached 404s skip the origin on repeats. Ingress locks the *.run.app bypass.</text>
</svg>
