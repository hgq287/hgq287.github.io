<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="460" viewBox="0 0 1480 460" role="img" aria-label="Kafka event log fanout with topics, consumer groups, and replay">
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .title { font: 700 28px Inter, "Segoe UI", Helvetica, Arial, sans-serif; fill: #1f2937; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .topic { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
      .cg { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; }
      .txt { font: 600 18px Inter, "Segoe UI", Helvetica, Arial, sans-serif; fill: #1f2937; }
      .small { font: 500 14px Inter, "Segoe UI", Helvetica, Arial, sans-serif; fill: #475569; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#ah); }
      .dash { stroke-dasharray: 6 6; }
    </style>
    <marker id="ah" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" width="1480" height="460" rx="18" />
  <text class="title" x="40" y="48">Kafka event log fanout</text>

  <rect class="box" x="60" y="170" width="260" height="110" rx="12" />
  <text class="txt" x="115" y="215">Checkout</text>
  <text class="small" x="92" y="245">publishes order.paid</text>

  <rect class="topic" x="410" y="150" width="320" height="150" rx="12" />
  <text class="txt" x="455" y="195">Topic: order.paid</text>
  <text class="small" x="455" y="225">partitions, offsets, retention</text>
  <text class="small" x="455" y="250">replay is normal</text>

  <rect class="cg" x="840" y="90" width="250" height="100" rx="12" />
  <text class="txt" x="885" y="135">Email group</text>
  <text class="small" x="885" y="160">send receipt</text>

  <rect class="cg" x="840" y="210" width="250" height="100" rx="12" />
  <text class="txt" x="900" y="255">Fraud group</text>
  <text class="small" x="885" y="280">risk checks</text>

  <rect class="cg" x="840" y="330" width="250" height="100" rx="12" />
  <text class="txt" x="890" y="375">Analytics group</text>
  <text class="small" x="885" y="400">count, metrics</text>

  <rect class="box" x="1180" y="210" width="250" height="100" rx="12" />
  <text class="txt" x="1220" y="255">New consumer</text>
  <text class="small" x="1210" y="280">can start later</text>

  <path class="line" d="M320 225 H405" />
  <path class="line" d="M730 225 H835" />
  <path class="line" d="M730 225 C780 170, 780 140, 835 140" />
  <path class="line" d="M730 225 C780 275, 780 365, 835 380" />

  <path class="line dash" d="M1090 260 H1175" />

  <text class="small" x="40" y="420">One event, many consumers. Each group tracks its own offsets. Replay lets you recover from downstream bugs.</text>
</svg>

