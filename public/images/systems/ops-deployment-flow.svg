<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="320" viewBox="0 0 1480 320" role="img" aria-label="Standard deployment flow from source lock to promote or rollback">
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .title { font: 700 28px Inter, "Segoe UI", Helvetica, Arial, sans-serif; fill: #1f2937; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .txt { font: 600 16px Inter, "Segoe UI", Helvetica, Arial, sans-serif; fill: #1f2937; }
      .num { font: 700 14px Inter, "Segoe UI", Helvetica, Arial, sans-serif; fill: #4338ca; }
      .small { font: 500 14px Inter, "Segoe UI", Helvetica, Arial, sans-serif; fill: #475569; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#ah); }
    </style>
    <marker id="ah" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" width="1480" height="320" rx="18" />
  <text class="title" x="40" y="48">Standard deployment flow</text>

  <rect class="box" x="40" y="110" width="170" height="100" rx="12" />
  <text class="num" x="55" y="140">1</text>
  <text class="txt" x="55" y="170">Lock source</text>
  <text class="small" x="55" y="192">and deps</text>

  <rect class="box" x="250" y="110" width="170" height="100" rx="12" />
  <text class="num" x="265" y="140">2</text>
  <text class="txt" x="265" y="170">Build clean</text>
  <text class="small" x="265" y="192">env</text>

  <rect class="box" x="460" y="110" width="170" height="100" rx="12" />
  <text class="num" x="475" y="140">3</text>
  <text class="txt" x="475" y="170">Package</text>
  <text class="small" x="475" y="192">artifact</text>

  <rect class="box" x="670" y="110" width="170" height="100" rx="12" />
  <text class="num" x="685" y="140">4</text>
  <text class="txt" x="685" y="170">Transfer</text>
  <text class="small" x="685" y="192">to target</text>

  <rect class="box" x="880" y="110" width="170" height="100" rx="12" />
  <text class="num" x="895" y="140">5</text>
  <text class="txt" x="895" y="170">Deploy and</text>
  <text class="small" x="895" y="192">migrate</text>

  <rect class="box" x="1090" y="110" width="170" height="100" rx="12" />
  <text class="num" x="1105" y="140">6</text>
  <text class="txt" x="1105" y="170">Verify</text>
  <text class="small" x="1105" y="192">health</text>

  <rect class="box" x="1280" y="110" width="160" height="100" rx="12" />
  <text class="num" x="1295" y="140">7</text>
  <text class="txt" x="1295" y="170">Promote or</text>
  <text class="small" x="1295" y="192">rollback</text>

  <path class="line" d="M210 160 H245" />
  <path class="line" d="M420 160 H455" />
  <path class="line" d="M630 160 H665" />
  <path class="line" d="M840 160 H875" />
  <path class="line" d="M1050 160 H1085" />
  <path class="line" d="M1260 160 H1275" />

  <text class="small" x="40" y="280">Same sequence for web apps, APIs, and multi-container stacks. Only service names and environs change.</text>
</svg>
