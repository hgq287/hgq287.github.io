<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="560" viewBox="0 0 1320 560" role="img" aria-label="SoC shared budget bottlenecks for edge AI pipelines">
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .title { font: 700 28px Inter, "Segoe UI", Helvetica, Arial, sans-serif; fill: #1f2937; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .box { fill: #eef2f7; stroke: #94a3b8; stroke-width: 2; }
      .shared { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; }
      .txt { font: 600 20px Inter, "Segoe UI", Helvetica, Arial, sans-serif; fill: #1f2937; }
      .small { font: 500 16px Inter, "Segoe UI", Helvetica, Arial, sans-serif; fill: #475569; }
      .section { font: 600 18px Inter, "Segoe UI", Helvetica, Arial, sans-serif; fill: #4b5563; }
      .line { stroke: #64748b; stroke-width: 2.5; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1320" height="560" rx="18" />
  <text class="title" x="40" y="48">Bottlenecks beyond FLOPs (shared SoC budget)</text>

  <rect class="box" x="80" y="110" width="260" height="80" rx="12" />
  <text class="txt" x="140" y="158">Decoder path</text>

  <rect class="box" x="80" y="250" width="260" height="80" rx="12" />
  <text class="txt" x="132" y="298">Inference path</text>

  <rect class="panel" x="470" y="100" width="780" height="360" rx="16" />
  <text class="section" x="500" y="140">Shared budget on the SoC</text>

  <rect class="shared" x="520" y="180" width="680" height="70" rx="12" />
  <text class="txt" x="730" y="223">DRAM bandwidth</text>

  <rect class="shared" x="520" y="275" width="680" height="70" rx="12" />
  <text class="txt" x="700" y="318">I/O and system fabric</text>

  <rect class="shared" x="520" y="370" width="680" height="70" rx="12" />
  <text class="txt" x="730" y="413">Thermal headroom</text>

  <path class="line" d="M340 150 H470" />
  <path class="line" d="M340 290 H470" />
  <path class="line" d="M470 150 V290" />

  <text class="small" x="40" y="510">When DRAM or thermal budget saturates, p95/p99 latency rises even if the NPU still has spare ops.</text>
</svg>
