  <!-- Subtle grid (engineering feel) -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
  </g>
  <!-- Monogram block -->
  <rect x="88" y="168" width="268" height="294" rx="20" fill="#1e1e28" stroke="#2a2a36" stroke-width="1"/>
  <text x="222" y="395" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="132" font-weight="800" fill="#ffffff" letter-spacing="-0.06em">HgQ</text>
  <text x="222" y="430" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="600" fill="#7c7cff" letter-spacing="0.35em">PORTFOLIO</text>
  <!-- Name and role -->
