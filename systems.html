"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]]}],false]],\"m\":\"$undefined\",\"G\":[\"$d\",[]],\"S\":true}\n"])</script><script>self.__next_f.push([1,"e:I[11997,[\"/_next/static/chunks/58689c96b0676c41.js\",\"/_next/static/chunks/13bdceb0db9ac3ad.js\",\"/_next/static/chunks/20c4f2dbccfb2b3c.js\"],\"default\"]\nf:T172f,"])</script><script>self.__next_f.push([1,"\nKafka shines when you want to do work **after** a request, without making the user wait.\n\nIf you only remember one sentence:\n\n**Kafka is a durable event log that many consumers can read at their own pace.**\n\n## Table of contents\n\n1. [Scenario](#1-scenario)\n2. [Queue vs log, in plain language](#2-queue-vs-log-in-plain-language)\n3. [Core model: topic, partition, offset, consumer group](#3-core-model-topic-partition-offset-consumer-group)\n4. [A tiny TypeScript lab (produce, consume, replay)](#4-a-tiny-typescript-lab-produce-consume-replay)\n5. [Delivery semantics: duplicates are normal](#5-delivery-semantics-duplicates-are-normal)\n6. [Case studies: LinkedIn and Uber](#6-case-studies-linkedin-and-uber)\n7. [The real failure modes](#7-the-real-failure-modes)\n8. [Checklist](#8-checklist)\n\n## 1. Scenario\n\nCheckout succeeds. Now several things must happen:\n\n- Send an email receipt\n- Run fraud checks\n- Update analytics\n- Notify warehouse\n\nIf Checkout calls all of those services synchronously:\n\n- latency becomes the sum of many dependencies\n- any slow system blocks the user\n- a temporary outage turns into a full outage\n\nInstead, Checkout publishes one event: `order.paid`.\nDownstream systems consume it and do their work asynchronously.\n\n![Kafka event log fanout](/images/systems/kafka-event-log-fanout.svg)\n\n## 2. Queue vs log in plain language\n\nIt is easy to think Kafka is \"just a queue\".\nThat framing causes bad designs.\n\n### Queue mental model\n\n- One message is handled by one worker\n- Once done, it disappears\n\n### Log mental model (Kafka)\n\n- Events are appended to a log\n- Consumers track their own position (offset)\n- Multiple consumer groups can read the same events independently\n- Replay is a normal operation, not a panic move\n\nThat is why Kafka fits \"many systems react to the same event\" so well.\n\n## 3. Core model: topic, partition, offset, consumer group\n\nYou do not need to memorize internals to use Kafka well.\nYou need these four ideas:\n\n- **Topic**: a named stream of events, like `order.paid`\n- **Partition**: a shard of that stream, ordered within the partition\n- **Offset**: the position of a consumer in a partition\n- **Consumer group**: a group of instances that share work for one topic\n\nTwo important consequences:\n\n1. Ordering is per partition, not global.\n2. Scaling consumers means you scale by partitions.\n\n## 4. A tiny TypeScript lab (produce, consume, replay)\n\nLibrary to look at:\n\n- `kafkajs`\n\nProducer sketch:\n\n```ts\nimport { Kafka } from 'kafkajs';\n\nconst kafka = new Kafka({ clientId: 'checkout', brokers: ['localhost:9092'] });\nconst producer = kafka.producer();\n\nawait producer.connect();\nawait producer.send({\n  topic: 'order.paid',\n  messages: [\n    { key: 'order-123', value: JSON.stringify({ orderId: 'order-123', amount: 1999 }) },\n  ],\n});\n```\n\nConsumer sketch (email service):\n\n```ts\nimport { Kafka } from 'kafkajs';\n\nconst kafka = new Kafka({ clientId: 'email', brokers: ['localhost:9092'] });\nconst consumer = kafka.consumer({ groupId: 'email-receipts' });\n\nawait consumer.connect();\nawait consumer.subscribe({ topic: 'order.paid', fromBeginning: false });\n\nawait consumer.run({\n  eachMessage: async ({ message }) =\u003e {\n    const payload = message.value ? JSON.parse(message.value.toString()) : null;\n    if (!payload) return;\n    // send email, then commit offset (handled by the client based on config)\n  },\n});\n```\n\nReplay idea:\n\n- Use a new group id to reprocess everything safely, or\n- Reset offsets for an existing group if you know what you are doing\n\nIn production, replay is how you recover from downstream bugs without asking upstream to resend.\n\n## 5. Delivery semantics: duplicates are normal\n\nIn many Kafka setups, you should assume \"at least once\" delivery.\nThat means duplicates can happen.\n\nFresh engineers often learn this the hard way:\n\n- customer gets two emails\n- you charge twice\n- you double-count analytics\n\nThe fix is not to wish for perfect delivery.\nThe fix is to make consumers idempotent.\n\nCommon patterns:\n\n- Use an idempotency key (event id) and store processed ids\n- Make writes upsert-based (insert on conflict do nothing)\n- Design handlers so repeating is safe\n\n## 6. Case studies: LinkedIn and Uber\n\n### LinkedIn: Kafka as the company data pipeline\n\nKafka started at LinkedIn as a central data pipeline.\nAt scale, the key idea is that a durable log lets many teams build consumers without coupling to one producer.\n\nReference: LinkedIn engineering posts about Kafka ecosystem.\n\n### Uber: Kafka for async queueing between microservices\n\nUber uses Kafka heavily for pub-sub between services.\nThey also built a Consumer Proxy to reduce common consumer mistakes and operational headaches.\n\nReference: Uber engineering post on Kafka async queuing with Consumer Proxy.\n\n## 7. The real failure modes\n\n### 7.1 Treating Kafka like a request path\n\nKafka is not a good place for \"please answer now\".\nIf you need a bounded response, that is usually gRPC or HTTP.\n\n### 7.2 Too few partitions\n\nIf you have one partition, you have one lane.\nYour consumer group cannot scale beyond that.\n\nPick partition count with growth in mind, but do not overdo it.\n\n### 7.3 No schema discipline\n\nJSON without rules becomes a mess fast.\nIf you scale teams, you eventually want schemas (Avro, protobuf, or JSON schema) plus versioning rules.\n\n### 7.4 Ignoring backpressure\n\nConsumers fall behind.\nThat is normal.\n\nYou should monitor:\n\n- consumer lag\n- error rates\n- retries\n\nAnd you should decide what happens when you are behind:\n\n- scale consumers\n- shed non-critical work\n- slow producers in the source system if needed\n\n## 8. Checklist\n\nBefore you pick Kafka for a workflow:\n\n1. The work can be asynchronous.\n2. You are happy with eventual consistency.\n3. You will handle duplicates safely.\n4. You have a story for replay and backfill.\n5. You can operate it (lag, retries, partitions, retention).\n\nIf you need a sync answer with a strict latency budget, use gRPC instead.\n\n"])</script><script>self.__next_f.push([1,"10:T16e3,"])</script><script>self.__next_f.push([1,"\nYou usually reach for gRPC when Service A needs an answer from Service B **now**, not later.\n\nThis post is not a framework tour. It focuses on what makes gRPC worth it in production:\n\n- A typed contract that does not drift\n- Deadlines that prevent slow calls from melting your fleet\n- Streaming when you need a long-lived, efficient connection\n\n## Table of contents\n\n1. [Scenario](#1-scenario)\n2. [What gRPC is, in one minute](#2-what-grpc-is-in-one-minute)\n3. [The contract: proto rules that keep you safe](#3-the-contract-proto-rules-that-keep-you-safe)\n4. [A tiny TypeScript lab (unary + deadline)](#4-a-tiny-typescript-lab-unary--deadline)\n5. [Streaming: when it is actually the right tool](#5-streaming-when-it-is-actually-the-right-tool)\n6. [Case studies: Netflix and Uber](#6-case-studies-netflix-and-uber)\n7. [The real failure modes](#7-the-real-failure-modes)\n8. [Checklist](#8-checklist)\n\n## 1. Scenario\n\nYou run an Order API. Before you accept an order, you must check Inventory:\n\n- Target: p95 under 50 ms\n- Data is small and structured (SKU, quantity, availability)\n- A slow dependency must not block worker threads forever\n\nThis is a synchronous call. If Order waits, the customer waits.\n\nThat is the shape where gRPC is a strong default.\n\n![gRPC service call boundary](/images/systems/grpc-service-call-boundary.svg)\n\n## 2. What gRPC is, in one minute\n\ngRPC is RPC over HTTP/2 with a strongly typed interface definition (protobuf).\n\nYou define the service once in a `.proto` file:\n\n- Both sides generate code from the same contract\n- Payloads are small (binary protobuf, not JSON text)\n- HTTP/2 keeps connections efficient (multiplexing, header compression)\n\nThe part that matters most is not speed. It is that the contract and clients stay consistent.\n\n## 3. The contract: proto rules that keep you safe\n\nIf you only remember one thing, remember this:\n\n**Proto files are an API. Treat them like one.**\n\nBasic rules that keep old clients working:\n\n- Never reuse field numbers\n- Only add optional fields, do not rename or change meaning lightly\n- Reserve removed field numbers\n- Keep messages small and stable\n\nExample contract:\n\n```proto\nsyntax = \"proto3\";\n\npackage inventory.v1;\n\nservice InventoryService {\n  rpc CheckAvailability(CheckAvailabilityRequest) returns (CheckAvailabilityResponse);\n}\n\nmessage CheckAvailabilityRequest {\n  string sku = 1;\n  int32 quantity = 2;\n}\n\nmessage CheckAvailabilityResponse {\n  bool available = 1;\n  int32 available_quantity = 2;\n}\n```\n\n## 4. A tiny TypeScript lab (unary + deadline)\n\nLibraries to look at:\n\n- `@grpc/grpc-js`\n- `@grpc/proto-loader`\n\nServer sketch:\n\n```ts\nimport * as grpc from '@grpc/grpc-js';\n\nfunction checkAvailability(call: grpc.ServerUnaryCall\u003cany, any\u003e, callback: grpc.sendUnaryData\u003cany\u003e) {\n  const { sku, quantity } = call.request;\n  const available = sku !== '' \u0026\u0026 quantity \u003e 0;\n  callback(null, { available, available_quantity: available ? 42 : 0 });\n}\n```\n\nClient sketch with a deadline:\n\n```ts\nimport * as grpc from '@grpc/grpc-js';\n\nconst deadline = new Date(Date.now() + 50);\n\nclient.CheckAvailability(\n  { sku: 'SKU-123', quantity: 2 },\n  { deadline },\n  (err: grpc.ServiceError | null, res?: any) =\u003e {\n    if (err) {\n      if (err.code === grpc.status.DEADLINE_EXCEEDED) {\n        // treat as a normal failure, not an incident\n      }\n      return;\n    }\n    // use res.available\n  }\n);\n```\n\nDeadlines are not optional.\nIf you do not set them, you will eventually have a slow dependency and a pile-up behind it.\n\n## 5. Streaming: when it is actually the right tool\n\nDo not add streaming because it looks advanced.\nUse streaming when you need a long-lived channel:\n\n- Mobile push connection with acknowledgements\n- Live updates to a dashboard\n- Low-latency fanout where polling is wasteful\n\nIf you just need request, response, unary calls are simpler and easier to debug.\n\n## 6. Case studies: Netflix and Uber\n\nThese are different companies, but the lessons are the same.\n\n### Netflix: contracts and codegen are the big win\n\nNetflix chose gRPC largely for the interface definition and generated clients.\nAt scale, the time saved is not microseconds per call. It is engineering time and fewer client bugs.\n\nReference: CNCF Netflix case study on gRPC.\n\n### Uber: streaming for mobile push, better tail latency\n\nUber moved parts of their push platform to gRPC streaming.\nThey reported better p95 connection latency and improved delivery acknowledgement reliability by keeping everything on one stream.\n\nReference: Uber engineering write-up on their next-gen push platform over gRPC.\n\n## 7. The real failure modes\n\nThese are the ones that bite teams early.\n\n### 7.1 No deadlines\n\nIf you ship without deadlines:\n\n- slow calls pile up\n- retries increase pressure\n- the system fails in a spiral\n\nSet deadlines everywhere and propagate them across hops.\n\n### 7.2 Too much data in one call\n\ngRPC is not a free pass to send large payloads.\n\nLarge messages:\n\n- increase tail latency\n- stress memory\n- increase GC pressure in managed runtimes\n\nPrefer small messages and paginate when needed.\n\n### 7.3 Browser constraints\n\nBrowsers cannot talk to native gRPC the same way servers do.\nIf you need browser clients, you usually add a gateway (gRPC-Web or an HTTP API in front).\n\n### 7.4 Debugging without good tooling\n\nWith REST, you can curl and read JSON.\nWith gRPC, you should plan for:\n\n- structured logs (method name, status, latency)\n- tracing\n- a standard way to test locally (grpcurl, or a small dev client)\n\n## 8. Checklist\n\nBefore you pick gRPC for a service boundary:\n\n1. The call is synchronous and needs a bounded latency budget.\n2. You will enforce deadlines by default.\n3. You can keep a shared proto contract stable (versioning discipline).\n4. You have a plan for observability (status codes, latency, tracing).\n5. You are not doing this for browsers without a gateway plan.\n\n"])</script><script>self.__next_f.push([1,"11:T1f39,"])</script><script>self.__next_f.push([1,"\nProduction runs on a small Vultr VPS: **1 CPU, 2GB RAM**. Cloud Run stays as failover only. Builds never run on the box. We push `main` and GitHub Actions handles the rest.\n\nNotes below are from a real deploy: what worked, what broke, and what we changed.\n\n## Context: what we chose and what we skipped\n\nThe project is one monorepo with **two Next.js apps on one domain**:\n\n- **Marketing / main site** (`/`): Next.js at the repo root  \n- **Product app**: lives in `apps/web`, public under `/apps/\u003cproduct-slug\u003e`\n\nTwo apps, two containers, one domain.\n\nWe kept **GCP Cloud Run as failover** so we can point DNS back if needed. Primary production is the **VPS** because it is cheap, controllable, and enough for this stage.\n\nA **2GB VPS does not build Next.js on-server.** `next build` eats RAM. Build on **GitHub Actions**, push images to **GHCR**, deploy to the VPS.\n\n## Architecture (compact)\n\n![Request path through nginx on the VPS](/images/systems/nextjs-vps-request-path.svg)\n\nTraffic comes into nginx on the VPS (`80/443`). nginx routes `/` to the site container (`127.0.0.1:8080`) and `/apps/` to the product container (`127.0.0.1:8081`).\n\n![CI/CD flow on GitHub Actions](/images/systems/nextjs-vps-cicd.svg)\n\nThe CI/CD flow is straightforward:\n\n1. Push to `main`.\n2. Build site and product images in GitHub Actions.\n3. Push images to GHCR.\n4. Run smoke tests on the runner.\n5. Ship images to the VPS and run `docker compose up`.\n\nContainers are **not** exposed to the internet directly. Only **nginx** is public. **Certbot** runs on the nginx **host**, not inside Docker, which keeps TLS and routing simpler.\n\n## Infra layout in the repo\n\nWe split concerns clearly:\n\n| Path | Role |\n| :--- | :--- |\n| `infra/platforms/shared/` | docker-compose and deploy scripts shared across VPS providers |\n| `infra/platforms/vultr/` | bootstrap, nginx template, and config sync for Vultr |\n| `infra/platforms/gcp/` | Terraform for Cloud Run failover |\n\nLater, moving to Hetzner means copying `vultr/` to `hetzner/`, then adjusting bootstrap. **`shared/` stays**.\n\nOn the VPS, runtime lives at a fixed workspace path, for example:\n\n```plaintext\n/home/\u003cdeploy-user\u003e/workspace/projects/\u003crepo-name\u003e/\n```\n\nOne-time bootstrap is at `~/workspace/bootstrap/vultr/`. We skipped `/opt` because the team already had a **workspace** layout. Pick paths and stick to them.\n\n## GitHub: setup before the workflow\n\n### Secrets\n\nIn the repo, go to **Settings**, then **Secrets**:\n\n| Secret | Purpose |\n| :--- | :--- |\n| `VULTR_HOST` | VPS IP |\n| `VULTR_USER` | SSH user (e.g. `deploy`) |\n| `VULTR_SSH_KEY` | Deploy private key |\n\nCreate a **dedicated key pair** for CI and add the public key to `authorized_keys` on the VPS. Do not reuse your daily personal key.\n\n### Org permissions for Actions\n\nIf your **GitHub org** locks `GITHUB_TOKEN` to read-only, the build job **cannot push to GHCR**. An org owner must enable **Read and write** at org level, or the job must declare `permissions: packages: write`.\n\n**GHCR is lowercase:** org `MyOrg` becomes image `ghcr.io/myorg/my-web/site:sha-xxxxxxx`. Tags use `sha-` plus **7 commit chars** so you always know which revision is running.\n\nAfter the first build, open **Packages**, connect your repo, then grant **Actions access**. Skipping this often causes smoke test failures.\n\n## Workflow: three jobs, one pipeline\n\nFile: `.github/workflows/deploy-production.yml`\n\n| Job | What it does |\n| :--- | :--- |\n| **build** | Build and push **site** + **product** images; tag `sha-xxxxxxx` and `latest` |\n| **smoke** | Pull on runner, run containers, `curl` `/api/health` and `/apps/\u003cproduct-slug\u003e` |\n| **deploy** | Ship images to VPS, `compose up` |\n\nIf **smoke passes** but **deploy fails**, the problem is usually **SSH or the VPS**, not the build.\n\n## GHCR pull on VPS vs shipping the image over SSH\n\nFirst attempt on the VPS used the usual pattern:\n\n```bash\ndocker login ghcr.io\ndocker compose pull\ndocker compose up -d\n```\n\nOn the **runner** this worked. On the **VPS** it failed with **`403 Forbidden`**, even with a PAT scoped to `read:packages`, and even when piping `GITHUB_TOKEN` from CI over SSH.\n\n`curl` to the GitHub user API returned **200**. `curl` to the GHCR manifest returned **403**. The token was still valid, but it could not read the org package. **Manage Actions access** on the package helps **workflows in that repo**, not arbitrary VPS pulls with a personal PAT.\n\n### What we chose\n\nWe switched to shipping images from CI: runner pulls (smoke already OK), runs `docker save`, compresses, copies to VPS `/tmp/`, runs `docker load`, deletes the tarball, then executes `DEPLOY_SKIP_PULL=1 ./scripts/deploy.sh`.\n\n| | Pull on VPS | Ship over SSH |\n| :--- | :--- | :--- |\n| GHCR auth on VPS | Required | Not required |\n| Bandwidth | Smaller if layers cache | Larger each deploy |\n| Reliability (our case) | Failed with 403 | Works |\n\nWe ship over SSH for now. For a small VPS and low traffic, a few extra minutes per deploy is fine. If org GHCR permissions get fixed, we can switch back to pull. `deploy.sh` supports both paths.\n\n`/tmp/` is only a **short-lived** tarball staging area, not where the app runs. Delete after `docker load`.\n\n## First-time VPS setup (bootstrap)\n\n`bootstrap.sh` installs: Docker, nginx, certbot, ufw, **2GB swap** (without swap, 2GB RAM hangs easily), copies nginx config to `/etc/nginx/sites-enabled/\u003capp-name\u003e`.\n\nRe-SSH after bootstrap so the **docker** group applies.\n\nWe once had **healthy containers** but **no site** because bootstrap had not run, so there was **no nginx config**. Green `docker ps` does not mean production is done.\n\nQuick checks:\n\n```bash\nls /etc/nginx/sites-enabled/\u003capp-name\u003e\ncurl -H \"Host: example.com\" http://127.0.0.1/api/health\n```\n\n## DNS and Certbot\n\nAt your DNS provider:\n\n- **A** `@` to VPS IP  \n- **A** `www` to VPS IP  \n- Remove stray **AAAA** if the VPS has no real IPv6  \n\nCertbot failed with **404**; logs showed odd IPv6 (`2001:4860:...`). Let's Encrypt was hitting the wrong host. Remove AAAA, wait for DNS, then:\n\n```bash\ncurl http://example.com/.well-known/acme-challenge/test\n```\n\nWhen HTTP is stable:\n\n```bash\nsudo certbot --nginx -d example.com -d www.example.com\n```\n\n## CSS bug: two Next.js apps, one domain\n\nThe **product app** HTML loads under `/apps/...` (product container). Default Next.js CSS lives at `/_next/static/...`, while nginx routes `/` to the **site** container.\n\nResult: the product page renders text, **no styles**. DevTools: CSS **404** or wrong file.\n\n**Fix:** `assetPrefix: \"/apps\"` in `apps/web/next.config.ts`. Assets become `/apps/_next/static/...` and hit the **product** upstream.\n\nTwo apps on one domain: plan **static asset routing up front**, not after launch.\n\n## After setup: what each release looks like\n\nMostly:\n\n1. Merge / push `main`\n2. Actions green (build, smoke, deploy)\n3. Browser check; hard refresh if CSS/JS changed\n\nNo manual SSH deploy. No GHCR pull on the VPS (with our current ship-over-SSH path).\n\nCI does **not** change nginx or certs. Reverse proxy or TLS changes are **manual on VPS**.\n\n- **Runtime env** (non-public vars in `.env`): edit on VPS, `docker compose up -d`\n- **`NEXT_PUBLIC_*`**: requires a **new image build** because values are baked at build time\n\n## Checklist\n\n1. GitHub secrets `VULTR_*`, org **Actions** permissions  \n2. VPS: bootstrap + sync config + `.env`  \n3. DNS **A** records; no bogus **AAAA**  \n4. Push `main`, wait for CI  \n5. Certbot after HTTP works  \n6. Verify main site and product path (e.g. `https://example.com/` and `https://example.com/apps/\u003cproduct-slug\u003e`)  \n\nFull copy-paste commands belong in your repo runbook (e.g. `docs/PRODUCTION-DEPLOY.md`).\n\nProduction is more than `docker run`: DNS, nginx, TLS, registry auth, and routing two Next.js apps on one hostname. The diagram in tutorials rarely matches org GHCR policy.\n\nA **2GB VPS** works if you **build in CI**, **terminate TLS at nginx**, and remember GHCR `403` often means org or package access issues, not just a missing PAT.\n"])</script><script>self.__next_f.push([1,"12:T1cc4,"])</script><script>self.__next_f.push([1,"\n## Why the bill jumps\n\nCloud Run billing spiked. Logs Explorer showed the usual scanner noise:\n\n- `GET /wp-login.php`\n- `GET /wp-admin/setup-config.php`\n- `GET /.env`\n\nThe app is **Next.js**, not WordPress. No PHP on the stack. Every probe still returns **404**, and you still pay for it.\n\nCloud Run bills **requests** and **instance time** (CPU/memory while instances handle concurrency). A scanner does not need a real page. Enough parallel junk can:\n\n- **Raise concurrency** and keep instances busy on cheap 404s.\n- **Trigger autoscaling** and cold starts when bursts outrun idle capacity.\n\nNext.js middleware can block some of this, but it still burns **container CPU**. Cheaper to cut noise at the **load balancer**: deny obvious paths before Cloud Run sees them, and let the **CDN cache 404s** so repeat probes skip the origin.\n\n## Architecture: three layers\n\n![Cloud Armor, CDN, and Cloud Run defense layers](/images/systems/cloud-run-edge-defense.svg)\n\nRequests hit the external HTTPS load balancer first. Cloud Armor evaluates policy there, so blocked requests are denied before they reach Cloud Run. Allowed requests then pass through Cloud CDN. Cache hits are served from the edge, and cache misses go through the serverless NEG to the Cloud Run revision.\n\n| Layer | Role | What you gain |\n| :--- | :--- | :--- |\n| **Cloud Armor** | WAF-style rules on the **backend service** attached to the load balancer | Obvious scanner paths return **403** at the LB edge; traffic **does not reach** the serverless NEG or Cloud Run. |\n| **Cloud CDN** | Edge caching, including **negative caching** for error responses | After a path legitimately returns **404** once, repeat requests can be served from the edge (very low origin cost). |\n| **Ingress control** | Cloud Run accepts only **internal + load-balanced** traffic | The default **`*.run.app`** URL is no longer a public bypass around Armor and CDN. Users hit **your domain on the LB** only. |\n\n## Layer 1: Cloud Armor as the first filter\n\nBots rotate IPs, so a static IP block list does not scale. **Custom rules** in a Cloud Armor **security policy** use **CEL** (Common Expression Language) on request attributes; regex uses **RE2** via `matches()`.\n\n**Examples (tune priorities to your policy):**\n\n- **PHP probes:** deny paths ending in `.php` (adjust if you ever serve real `.php` assets; most Next.js stacks do not).\n\n```text\nrequest.path.matches('(?i:.*\\\\.php$)')\n```\n\n- **WordPress-shaped paths** (normalize case if your clients send odd casing. `contains` is literal; `request.path.lower()` is an option per the [rules language reference](https://docs.cloud.google.com/armor/docs/rules-language-reference)):\n\n```text\nrequest.path.contains('/wp-admin/') || request.path.contains('/wp-content/')\n```\n\n- **Sensitive file extensions** (extend as needed):\n\n```text\nrequest.path.matches('(?i:.*\\\\.(env|git|bak|sql|config)(/|$))')\n```\n\n**Rules that matter:**\n\n- Put **specific rules above broad ones** in priority order.\n- **Managed rules** (OWASP CRS, Google-managed rules, Adaptive Protection) catch attack classes regex misses and are worth adding on top of path blocks.\n- **False positives:** test in preview mode if you can, then `deny(403)` (or `deny(404)` if you do not want to advertise a block).\n\nDeny actions evaluated at the **load balancer** mean those requests **never invoke** Cloud Run: no container CPU for that request line item.\n\n## Layer 2: CDN negative caching, not \"cache everything\"\n\nDo not turn on **force-cache-all** (`CACHE_MODE_FORCE_CACHE_ALL` or the console equivalent) for a **dynamic** Next.js app. It can cache **200** responses that should stay private or vary per user.\n\nFor scanner traffic, use **negative caching**:\n\n- Configure the backend service / CDN settings so **404** (and optionally **403** if your origin returns them for unknown routes) can be cached at the edge for a bounded TTL (for example **many hours** for static junk paths).\n- **Trade-off:** a long **404** TTL also freezes real mistakes. Ship a bad route, and the edge may keep serving 404 until expiry. Balance scan noise vs recovery time, or purge cache when possible.\n\nUse normal cache rules for static assets (`public/`, hashed filenames). Do not force one cache mode over the whole app.\n\n## Layer 3: Close the `*.run.app` bypass\n\nIf the load balancer is public but the **Cloud Run service URL** is still open to the internet, scanners will hit **`https://\u003cservice\u003e-\u003chash\u003e-\u003cregion\u003e.a.run.app`** directly and **skip Cloud Armor and CDN**.\n\n**Fix (console wording):** set Cloud Run **Ingress** to **Allow internal traffic and traffic from Cloud Load Balancing**. At the API level, ingress is limited to internal sources and Google Cloud external HTTP(S) load balancers. See current [Cloud Run ingress documentation](https://cloud.google.com/run/docs/securing/ingress) for exact labels in your project.\n\nPair that with **DNS and TLS on the external HTTPS load balancer** as the only customer-facing entry.\n\n## Setup steps\n\n1. **Serverless NEG**: point a serverless Network Endpoint Group at the **Cloud Run** service (region, service name).\n2. **Backend service**: use that NEG as the backend; enable **Cloud CDN** when it fits your caching plan.\n3. **URL map + HTTPS proxy + forwarding rule**: create a global external **Application Load Balancer (HTTP/S)** in front of the backend.\n4. **Cloud Armor**: create a security policy, attach it to the **backend service**, and add CEL rules (start strict on obvious scanner paths).\n5. **CDN tuning**: enable **negative caching** for **404** (optional **403**); avoid blanket **force-cache-all** for dynamic apps.\n6. **Cloud Run ingress**: restrict to **internal + Cloud Load Balancing**; verify the default `run.app` URL no longer accepts public probes.\n7. **Validate**: run `curl` against the LB hostname and direct `run.app`; confirm denied paths never appear in **Cloud Run request logs**.\n\n## What to look for in logs\n\nLog field names change between schema versions; search by intent:\n\n- **Load Balancer / Armor:** filter for **deny** outcomes, matched rule names, and **low backend request volume** for garbage paths.\n- **CDN:** filter for **cache fill / hit** indicators vs **origin round-trips**; repeat scans of the same dead path should show **edge satisfaction** rather than new Cloud Run instances spinning up.\n- **Cloud Run:** request logs trend toward **legitimate routes** (for example **200** on real pages) rather than dense **404** storms during idle periods.\n\nBefore hardening, **\"Starting new instance\"** often lined up with scan bursts. Afterward that noise drops on blocked paths. The origin either never sees them, or sees them once per cache key before negative caching kicks in.\n\n## LB cost\n\nA global HTTPS load balancer is not free. Forwarding rules, proxy infrastructure, and data processing costs vary by region.\n\nIt is still cheaper than letting scanner concurrency drive **Cloud Run** instance time without a cap.\n\nMiddleware can express policy; it spends **container** resources. **Cloud Armor** on the backend service, **CDN negative caching** where safe, and **ingress locked to load balancing only** cut junk before your revision runs.\n\nFor Terraform, codify the NEG, backend service, URL map, Armor attachment, and CDN flags next to the Cloud Run service, using the same split as in the Cloud Run delivery-flow write-up.\n"])</script><script>self.__next_f.push([1,"13:T270d,"])</script><script>self.__next_f.push([1,"\n## Why this stack works\n\nWhen we build a web app, coding is only half of the story.  \nThe other half is delivery: build, store, deploy, and update safely.\n\nThis stack solves that flow clearly:\n\n- **Cloud Build** builds the container image.\n- **Artifact Registry** stores the image version.\n- **Terraform** defines infra as code.\n- **Cloud Run** runs the app with autoscaling.\n\nOne pipeline, clear ownership, less manual deploy work.\n\n## Tool roles (simple view)\n\n| Tool | Main role | Why it matters |\n| :--- | :--- | :--- |\n| Cloud Build | Build and push image | Reproducible builds from source |\n| Artifact Registry | Store versioned image | Traceable deploys and rollback |\n| Terraform | Provision infra | Same setup across dev/stage/prod |\n| Cloud Run | Run container app | Serverless scale and pay-per-use |\n\n## Terraform use-cases: when and why\n\nTerraform is most useful when infrastructure starts to repeat across environments or people.\n\nUse Terraform when:\n\n- You have **dev/stage/prod** and want the same infra shape in all of them.\n- Your team wants infra changes reviewed in PRs, same as app code.\n- You need repeatable setup for Cloud Run, IAM, Artifact Registry, networking, and secrets.\n- You want safer rollback and auditing (what changed, when, and by whom).\n\nFor a single demo app, console clicks may be fine.  \nFor real delivery flow with more than one environment, Terraform quickly pays back.\n\n## End-to-end flow\n\n![Cloud delivery flow from Git to Cloud Run](/images/systems/cloud-delivery-flow.svg)\n\nThis delivery flow has two connected tracks:\n\n- Build track: Git push triggers Cloud Build, which builds the Docker image and pushes it to Artifact Registry.\n- Deploy track: Terraform applies infrastructure and updates Cloud Run to the target image tag.\n- Rollback track: set the image tag to a previous stable version and run Terraform apply again.\n\nThe key split:\n\n- App artifact lifecycle is handled by build + registry.\n- Runtime infrastructure lifecycle is handled by Terraform.\n\n## Scenario: Deploy a Next.js app\n\nBelow is a **real-shaped** example: Next.js builds inside Docker, the image runs on Cloud Run, and Cloud Build pushes to Artifact Registry.\n\n### A) Pick how Next.js runs in the container\n\n**Option 1: Static export (`output: 'export'`)**  \nGood for marketing sites, docs, and blogs that ship as HTML under `out/`.  \nRun it behind **nginx** in the container. Cloud Run expects the process to listen on **`PORT`** (often `8080`), so nginx should listen on that port.\n\n**Option 2: Node server (`output: 'standalone'`)**  \nUse when you need SSR, Route Handlers, or dynamic rendering.  \nBuild produces `.next/standalone`; you run `node server.js` and set `PORT` to what Cloud Run gives you.\n\nPick one path per project. Mixing export and standalone in one Dockerfile only confuses the build.\n\n### B) Dockerfile: static export + nginx (concrete)\n\n`Dockerfile` (multi-stage: build Next, serve `out/`):\n\n```dockerfile\n# --- build ---\nFROM node:22-alpine AS builder\nWORKDIR /app\nCOPY package.json package-lock.json* ./\nRUN npm ci\nCOPY . .\n# Your app should run `next build` and emit `out/` (next.config: output: \"export\")\nRUN npm run build\n\n# --- run ---\nFROM nginx:1.27-alpine\nCOPY nginx.conf /etc/nginx/conf.d/default.conf\nCOPY --from=builder /app/out /usr/share/nginx/html\nEXPOSE 8080\n```\n\n`nginx.conf` (listen on 8080 so Cloud Run’s default port matches):\n\n```nginx\nserver {\n  listen 8080;\n  server_name _;\n  root /usr/share/nginx/html;\n  index index.html;\n\n  location / {\n    try_files $uri $uri/ $uri.html /index.html;\n  }\n}\n```\n\n`.dockerignore` (keeps the build context small):\n\n```gitignore\nnode_modules\n.next\nout\n.git\n.env*\n```\n\n**Local smoke test:**\n\n```bash\ndocker build -t website:local .\ndocker run --rm -p 8080:8080 website:local\n# Open http://localhost:8080\n```\n\n### C) Dockerfile: Next.js standalone (when you are not using `export`)\n\nIn `next.config` use `output: \"standalone\"`, then:\n\n```dockerfile\nFROM node:22-alpine AS builder\nWORKDIR /app\nCOPY package.json package-lock.json* ./\nRUN npm ci\nCOPY . .\nRUN npm run build\n\nFROM node:22-alpine AS runner\nWORKDIR /app\nENV NODE_ENV=production\nENV PORT=8080\nENV HOSTNAME=0.0.0.0\nCOPY --from=builder /app/public ./public\nCOPY --from=builder /app/.next/standalone ./\nCOPY --from=builder /app/.next/static ./.next/static\nCMD [\"node\", \"server.js\"]\n```\n\nCloud Run sets `PORT`; the standalone server reads it, so you usually do not hardcode another port.\n\n### D) `cloudbuild.yaml`: build image and push to Artifact Registry\n\nSubstitutions match the `gcloud builds submit` example later. Adjust project IDs and names.\n\n```yaml\nsubstitutions:\n  _REGION: asia-southeast1\n  _REPO: web-repo\n  _IMAGE_NAME: website\n  _TAG: v1\n\nsteps:\n  - name: gcr.io/cloud-builders/docker\n    args:\n      - build\n      - \"-t\"\n      - \"${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE_NAME}:${_TAG}\"\n      - .\n\nimages:\n  - \"${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE_NAME}:${_TAG}\"\n```\n\nCloud Build’s service account needs permission to push to Artifact Registry (e.g. Artifact Registry Writer on the repo or project).\n\n### E) Build and push image with Cloud Build\n\nExample command:\n\n```bash\ngcloud builds submit --config=cloudbuild.yaml \\\n  --substitutions=_REGION=asia-southeast1,_REPO=web-repo,_IMAGE_NAME=website,_TAG=v1 \\\n  --project=my-web-project\n```\n\nWhat this gives you:\n\n- A tagged image like `asia-southeast1-docker.pkg.dev/my-web-project/web-repo/website:v1`\n- A deployment artifact you can reuse across environments\n\n### F) Keep image in Artifact Registry\n\nWhy this is important:\n\n- Every release has a clear version.\n- Rollback is easy: deploy an older tag.\n- Security scanning and access control are centralized.\n\n### G) Manage Cloud Run with Terraform\n\nSmall Terraform sample:\n\n```hcl\nresource \"google_cloud_run_v2_service\" \"website\" {\n  name     = \"website\"\n  location = var.region\n\n  template {\n    containers {\n      image = var.image_uri\n      ports {\n        container_port = 8080\n      }\n    }\n  }\n}\n```\n\n### H) How to write Terraform (practical workflow)\n\nThink in this order: **providers -\u003e variables -\u003e resources -\u003e outputs**.\n\n1. **Provider and project context**\n\n```hcl\nterraform {\n  required_providers {\n    google = {\n      source  = \"hashicorp/google\"\n      version = \"~\u003e 5.0\"\n    }\n  }\n}\n\nprovider \"google\" {\n  project = var.project_id\n  region  = var.region\n}\n```\n\n2. **Input variables** (things that change by environment)\n\n```hcl\nvariable \"project_id\" { type = string }\nvariable \"region\"     { type = string }\nvariable \"service_name\" {\n  type    = string\n  default = \"website\"\n}\nvariable \"image_uri\" { type = string }\n```\n\n3. **Resources** (what you want Terraform to manage)\n\n```hcl\nresource \"google_artifact_registry_repository\" \"web_repo\" {\n  location      = var.region\n  repository_id = \"web-repo\"\n  format        = \"DOCKER\"\n}\n\nresource \"google_cloud_run_v2_service\" \"website\" {\n  name     = var.service_name\n  location = var.region\n\n  template {\n    containers {\n      image = var.image_uri\n      ports {\n        container_port = 8080\n      }\n    }\n  }\n}\n```\n\n4. **Outputs** (what other steps need)\n\n```hcl\noutput \"cloud_run_uri\" {\n  value = google_cloud_run_v2_service.website.uri\n}\n```\n\n5. **Environment files**\n\nUse a `terraform.tfvars` (or `dev.tfvars`, `prod.tfvars`) per environment:\n\n```hcl\nproject_id   = \"my-web-project-dev\"\nregion       = \"asia-southeast1\"\nservice_name = \"website\"\nimage_uri    = \"asia-southeast1-docker.pkg.dev/my-web-project-dev/web-repo/website:v1\"\n```\n\n6. **Execution cycle**\n\n```bash\nterraform fmt\nterraform init\nterraform validate\nterraform plan -var-file=dev.tfvars\nterraform apply -var-file=dev.tfvars\n```\n\nThat is the full writing loop: write small blocks, validate early, plan before apply, then promote the same code to the next environment by changing only `tfvars`.\n\n### I) Recommended Terraform folder structure\n\nKeep Terraform files boring and predictable:\n\n```plaintext\nterraform/\n  providers.tf\n  variables.tf\n  main.tf\n  outputs.tf\n  dev.tfvars\n  prod.tfvars\n```\n\nMinimal example:\n\n- `providers.tf`: provider and Terraform version.\n- `variables.tf`: typed inputs (`project_id`, `region`, `image_uri`).\n- `main.tf`: Cloud Run + Artifact Registry + IAM resources.\n- `outputs.tf`: service URL, useful IDs.\n- `*.tfvars`: environment-specific values only.\n\nThis layout makes onboarding easier and reduces \"where is that config?\" confusion.\n\nRun:\n\n```bash\nterraform init\nterraform plan\nterraform apply\n```\n\nSet `container_port` to the port the container actually listens on (here **8080**, same as nginx and the standalone example with `PORT=8080`).\n\nNow infra and deploy config are reviewable in Git, same as application code.\n\n## Design choices that save time later\n\n### Pin every deployment by image tag\n\nDo not deploy floating tags like `latest` in production.\nUse explicit tags (`v1`, `v2`, or commit SHA) so release history is deterministic.\n\n### Keep environments separate\n\nUse separate Terraform state or projects for dev/stage/prod.\nThis avoids accidental cross-environment impact.\n\n### Make rollback a first-class path\n\nBecause Cloud Run deploys from image tags, rollback should be one fast command or one Terraform variable change.\n\n## When this is overkill\n\nThis setup is strong, but not always needed.\n\n- For tiny prototypes, full Terraform can feel heavy.\n- Teams new to IaC need onboarding time.\n- Strict release controls add process overhead.\n\nIf your app is still very early, start small and introduce Terraform once services or environments grow.\n\n## Practical checklist\n\n- [ ] Build image in CI, not on local machine\n- [ ] Push only versioned tags to Artifact Registry\n- [ ] Deploy Cloud Run via Terraform, not console clicks\n- [ ] Keep runtime variables in secure config/secrets\n- [ ] Verify rollback path before production release\n\nCloud Run, Terraform, Artifact Registry, and Cloud Build work best as one delivery system. Wired together, deploys stay predictable and reviewable when something breaks at 2am.\n"])</script><script>self.__next_f.push([1,"14:T1395,"])</script><script>self.__next_f.push([1,"\nCompanion to [Edge video AI pipelines: queues, DAG runtimes, and real bottlenecks](/systems/edge-ai-pipeline-dag-runtime-bottlenecks): that one covers **throughput and scheduling**; this one covers **model artifacts**, **memory contracts**, and **portability** across SoCs. It stays **runtime-agnostic**: plug in TensorRT, SNPE, QNN, OpenVINO, or whatever your board ships with.\n\n**Goal:** treat export, calibration, and buffer ownership with the same rigor as CI and deploy steps.\n\n## Table of contents\n\n1. [Three layers of responsibility](#1-three-layers-of-responsibility)\n2. [PTQ versus QAT in one practical table](#2-ptq-versus-qat-in-one-practical-table)\n3. [What native support means in an engine](#3-what-native-support-means-in-an-engine)\n4. [Zero-copy versus synchronization](#4-zero-copy-versus-synchronization)\n5. [Sample: explicit buffer ownership](#5-sample-explicit-buffer-ownership)\n6. [HAL sketch: capability flags](#6-hal-sketch-capability-flags)\n7. [Checklist](#7-checklist)\n\n## 1. Three layers of responsibility\n\n![From training to device runtime](/images/systems/edge-ai-quantization-layers.svg)\n\nThink of the stack as three connected layers:\n\n- **Training side**: model quality, regularization, and sometimes QAT graphs.\n- **Conversion**: export format, operator support, fusion, calibration tensors, and optional sparsity.\n- **Runtime + engine**: tensor layouts, batching, device placement, buffer lifetimes, and fallback when an op is missing.\n\nThe important part is the **contracts** between these layers, not only the export file format.\n\n## 2. PTQ versus QAT in one practical table\n\n| Topic | PTQ | QAT |\n|-------|-----|-----|\n| Engineering cost | Lower | Higher |\n| Accuracy under domain shift | More fragile | Usually better |\n| Good fit | Stable inputs, rapid iteration | Safety-critical or wide scene variance |\n\nNeither PTQ nor QAT replaces **measurement** on device. On the edge, **latency**, **memory**, and **worst-case** behavior decide whether a graph ships.\n\n## 3. What native support means in an engine\n\n“Native support” should mean more than **loading a file**. A useful pipeline engine tracks:\n\n- **Expected tensor layouts** per backend (NCHW vs NHWC, packed formats).\n- **Quantization parameters** per tensor where applicable (scales, zero points).\n- **Batching policy** (fixed batch, dynamic shapes, padding rules).\n- **Degradation paths** when an op is unsupported (partition graph, CPU fallback, or refuse to run).\n\nThat avoids a graph that looks fine on desktop but **cannot be scheduled** reliably on device.\n\n## 4. Zero-copy versus synchronization\n\n![Zero-copy still needs synchronization](/images/systems/edge-ai-zero-copy-sync.svg)\n\nZero-copy (shared pools, **DMA**-friendly buffers, importer APIs) cuts **memcpy** overhead. It does **not** remove:\n\n- **Cache coherency** work when CPU and accelerator share memory maps.\n- **Fences / events** between producers and consumers.\n- **Lifetime rules**: who is allowed to overwrite a buffer while another stage still reads it.\n\nIn a real frame path, DMA feeds decode, decode returns or recycles buffers into a pool, and the NPU consumes a tensor view from that pool. Even with shared buffers, you still need explicit synchronization points between producer and consumer stages.\n\n## 5. Sample: explicit buffer ownership\n\nIllustrative pseudo-C++:\n\n```cpp\nenum class Owner { Decoder, Preprocess, NPU, CPU };\n\nstruct FrameBuffer {\n  void*  y;\n  void*  uv;\n  size_t stride_y;\n  Owner  owner;\n};\n\nbool handoff(FrameBuffer\u0026 fb, Owner from, Owner to) {\n  if (fb.owner != from) return false;\n  fb.owner = to;\n  // insert SoC-specific cache ops / fences here\n  return true;\n}\n```\n\nThe point is not the enum itself. It is **making illegal ownership states hard to commit** in review and in runtime asserts.\n\n## 6. HAL sketch: capability flags\n\nInstead of `#ifdef` for every SoC inside business logic, expose **capabilities** the graph compiler or runtime can query:\n\n| Flag | Meaning for the engine |\n|------|-------------------------|\n| `kResizeOnFastIP` | Prefer fixed-function or DSP resize to save CPU/GPU |\n| `kInt8PreferredPath` | Prefer INT8-capable accelerator for conv-heavy graphs |\n| `kDmabufImporter` | Import camera or decoder buffers without extra copies |\n\n```cpp\nstruct DeviceCaps {\n  bool resize_on_fast_ip;\n  bool int8_preferred_path;\n  bool dmabuf_importer;\n};\n\nDeviceCaps probe(const char* platform_id);\n```\n\nGraph lowering reads **caps** and chooses backends. Product code stays stable; new SoCs add **probe** data only at the boundary.\n\n## 7. Checklist\n\n1. Calibration and QAT artifacts are versioned with the **exact** export pipeline used in CI.\n2. Each buffer transition has a named **owner** and a **sync rule**.\n3. Fallback paths are **tested**, not only listed in documentation.\n4. HAL exposes **capabilities**, not raw vendor headers, at the boundary under your control.\n\n---\n\nIllustrative architecture note. Backend names are examples; validate against your vendor SDKs and safety requirements.\n"])</script><script>self.__next_f.push([1,"15:T180f,"])</script><script>self.__next_f.push([1,"\nThis note is a practical systems sketch for shipping **stable** video analytics on embedded SoCs. It stays **SDK-agnostic**: swap decoder, NPU runtime, and queue policies to fit your platform. Topics: DAG topology, buffer contracts, scheduling, and the limits (DRAM, thermal, fabric) that show up under real load, not only on slides.\n\n**Goal:** reason about **p95/p99 latency**, drops, and jitter with the same discipline as OS scheduling and memory: name the bottleneck, then optimize the critical path.\n\n## Table of contents\n\n1. [Scenario](#1-scenario)\n2. [DAG plus queues, not DAG alone](#2-dag-plus-queues-not-dag-alone)\n3. [Map stages to executors](#3-map-stages-to-executors)\n4. [Sample shape: stages and a minimal scheduler loop](#4-sample-shape-stages-and-a-minimal-scheduler-loop)\n5. [Bottlenecks beyond FLOPs](#5-bottlenecks-beyond-flops)\n6. [Profiling the critical path](#6-profiling-the-critical-path)\n7. [Checklist](#7-checklist)\n\n## 1. Scenario\n\nAssume:\n\n- One inbound stream: **1080p30** (could scale to N streams later).\n- Decode from compressed video (vendor decoder on **DSP/VDEC** or CPU fallback).\n- Preprocess: resize, mean/variance, layout conversion.\n- Detector: **INT8** network on **NPU** (or GPU where that is the only option).\n- Tracker and business logic: mostly **CPU**.\n- Output: overlay, encode, or metadata only.\n\nIn production, the painful failure mode is usually not “model accuracy on a slide.” It is **p95/p99 latency**, **frame drops**, and **jitter** when the SoC gets hot or DRAM gets busy.\n\n## 2. DAG plus queues, not DAG alone\n\nA DAG drawn on a whiteboard is **topology**. A shipped engine needs **edges with semantics**:\n\n- **Buffer ownership** (who allocates, who releases, who may alias).\n- **Backpressure** (what happens when the next stage is slower).\n- **Failure policy** (drop oldest, block, degrade resolution, skip inference every K frames).\n\nThe mental picture to implement is **DAG nodes plus bounded queues** between them, not only \"node A calls node B.\"\n\n![Edge video AI pipeline with bounded queues](/images/systems/edge-ai-pipeline-dag.svg)\n\nA typical order is ingest (`camera/file` then `decoder`), vision (`preprocess`, `detector`, `tracker`), then output (`overlay/encode`). Put a bounded queue between each stage and define queue depth, drop policy, and metrics for every edge.\n\nThose stage queues are not decorative. They are where you implement **max depth**, **drop policy**, and **metrics** (wait time, utilization).\n\n## 3. Map stages to executors\n\nBelow is a **pattern table**, not a universal law. Names change per vendor (DSP, VPU, NPU, GPU).\n\n| Stage | Typical executor | Why | Risk if misplaced |\n|-------|------------------|-----|---------------------|\n| Decode | Hardware decoder or DSP | Bitstream work should not starve the rest | CPU pegged, everything else drifts |\n| Preprocess | GPU shader, NEON, or vendor image DSP | High pixel volume | Extra copies through DRAM |\n| Detector | NPU or GPU | Convolution-heavy | Deep queues hide latency until they explode |\n| Tracker | CPU | Small tensors, branching logic | Lock contention if shared with unrelated work |\n\nScheduling here is not only “a thread pool.” It is **mapping nodes to executors** plus **policies** (priority, affinity, batching rules).\n\n## 4. Sample shape: stages and a minimal scheduler loop\n\nThe following is **illustrative pseudo-C++** for handles, queues, stage functions, and policy hooks. It is not a drop-in library.\n\n```cpp\n// Opaque buffer id: pool index, dmabuf handle, or vendor token.\nstruct BufferHandle { uint32_t id; };\n\ntemplate \u003ctypename T\u003e\nstruct BoundedQueue {\n  bool try_push(const T\u0026);   // returns false when full (backpressure)\n  bool try_pop(T\u0026 out);\n  size_t depth() const;\n};\n\nstruct StageCtx {\n  BoundedQueue\u003cBufferHandle\u003e* in_q;\n  BoundedQueue\u003cBufferHandle\u003e* out_q;\n};\n\nvoid run_preprocess(StageCtx\u0026 ctx) {\n  BufferHandle in, out;\n  while (ctx.in_q-\u003etry_pop(in)) {\n    // map in, produce out, or recycle on failure\n    if (!allocate_output(out)) {\n      release(in);\n      continue;\n    }\n    preprocess(in, out);\n    while (!ctx.out_q-\u003etry_push(out)) {\n      // policy: spin, sleep, or drop according to product rules\n    }\n    release(in);\n  }\n}\n```\n\n**Review focus for this shape**\n\n- Clear **ownership** transitions (`release`, `allocate_output`).\n- A place to attach **metrics** (`depth()`, wait in `try_push`).\n- No hidden copies in the “happy path” comments (real code still needs explicit sync).\n\n## 5. Bottlenecks beyond FLOPs\n\n![Shared SoC budget bottlenecks for edge AI](/images/systems/edge-ai-soc-bottlenecks.svg)\n\nAt runtime, decoder and inference stages compete for shared SoC budgets: DRAM bandwidth, system fabric or I/O bandwidth, and thermal headroom. This shared pressure is often the real limit before raw compute is exhausted.\n\n**DRAM bandwidth:** Large feature maps, suboptimal strides, or extra color converts can saturate memory before the NPU runs out of ops.\n\n**Thermal:** Sustained load reduces clocks. Jitter rises. A pipeline that looked fine for five minutes fails after twenty.\n\n**PCIe / fabric:** Matters when accelerators or cameras are off-chip. Even on-chip, **contention** on shared buses still appears in integrated designs under stress.\n\n## 6. Profiling the critical path\n\nUse vendor tools where available (GPU/NPU timelines), plus system-wide views (**perf**, **eBPF**, **Nsight Systems**, or equivalents). Then:\n\n1. Identify the **longest dependent chain** per frame (critical path).\n2. Decide whether the next optimization belongs there or in **queue policy** and **memory traffic**.\n\nOptimizing a kernel that is not on the critical path is a common way to waste weeks.\n\n## 7. Checklist\n\n1. Every edge between stages has **max queue depth** and **policy** under pressure.\n2. You can name the **one** system bottleneck for your workload (DRAM, thermal, PCIe/fabric, or a specific stage).\n3. Latency numbers are reported with **percentiles**, not only averages.\n4. The team agrees what **degradation** means before it is needed in the field.\n\n---\n\nIllustrative architecture note. Tune numbers and policies to your SoC, OS, and product SLA.\n"])</script><script>self.__next_f.push([1,"16:Taf2,"])</script><script>self.__next_f.push([1,"\n## 1. Docker vs virtual machine\n\nTo understand why containers start fast, focus on the kernel boundary:\n\n![Docker vs Virtual Machine architecture](/images/systems/docker-vm-architecture.svg)\n\n- A VM includes a full guest OS and usually runs through a hypervisor layer.\n- A container shares the host kernel and isolates user-space processes.\n- Because there is no extra guest kernel per workload, memory and startup overhead are usually lower.\n\n## 2. Core commands\n\n### A. Image management\n\n**Build an image:**\n\n```bash\ndocker build -t \u003cname\u003e:\u003ctag\u003e .\n```\n\n**Remove dangling images** (failed builds, free disk space):\n\n```bash\ndocker image prune\n```\n\n**Inspect layers** (see what makes an image heavy):\n\n```bash\ndocker history \u003cimage_id\u003e\n```\n\n### B. Container lifecycle\n\n**Run app and map port:**\n\n```bash\ndocker run -d -p 8080:3000 --name my-app \u003cimage\u003e\n```\n\n- `-d`: Run in the background (detached).\n- `-p 8080:3000`: Host port 8080 maps to container port 3000.\n\n**Stream logs** (essential for debugging):\n\n```bash\ndocker logs -f \u003ccontainer_name\u003e\n```\n\n**Shell into a running container:**\n\n```bash\ndocker exec -it \u003ccontainer_name\u003e /bin/sh\n```\n\n### C. Cleanup\n\n**Full cleanup** (containers, images, networks, volumes not in use):\n\n```bash\ndocker system prune -a --volumes\n```\n\nUse when disk is full. This removes everything unused.\n\n## 3. Networking\n\nIn a stack like NestJS + Kafka + PostgreSQL, containers need to talk to each other.\n\n**Create a custom network:**\n\n```bash\ndocker network create my-system-net\n```\n\n**Attach services:** When you run a container, add `--network my-system-net`.\n\n**Internal DNS:** Containers can reach each other by **name** (e.g. NestJS connects to Postgres at `postgres:5432` instead of an IP).\n\n## 4. Docker Compose\n\nUse a single `docker-compose.yml` to define and run the whole stack instead of many manual commands.\n\n```yaml\nversion: '3.8'\nservices:\n  api-gateway:\n    build: .\n    ports:\n      - \"3000:3000\"\n    depends_on:\n      - redis\n      - db\n    networks:\n      - backend-net\n\n  db:\n    image: postgres:15-alpine\n    volumes:\n      - db-data:/var/lib/postgresql/data\n    environment:\n      POSTGRES_PASSWORD: ${DB_PASSWORD}\n    networks:\n      - backend-net\n\nnetworks:\n  backend-net:\n    driver: bridge\n\nvolumes:\n  db-data:\n```\n\n## 5. Checklist\n\n**Persistence:** Always use **volumes** for databases. If the container is removed, data remains.\n\n**Security:**\n\n- Never put secrets in the Dockerfile. Use `.env` and `environment` in Compose.\n- Prefer Alpine-based images to reduce attack surface.\n\n**Optimization:**\n\n- **Layer order in Dockerfile:** Put commands that change less often (e.g. `npm install`) higher so the build cache is reused.\n- Use **`.dockerignore`** to exclude `node_modules`, `.git`, etc. from the build context. Builds can be much faster.\n"])</script><script>self.__next_f.push([1,"17:T2848,"])</script><script>self.__next_f.push([1,"\nThis playbook is a practical guide you can reuse for a web app, an API, or a multi-container stack. It stays framework-agnostic: swap service names, paths, and env vars to fit your project.\n\n## Table of contents\n\n1. [Executive summary](#1-executive-summary)\n2. [Deployment architecture patterns](#2-deployment-architecture-patterns)\n3. [Standard deployment flow](#3-standard-deployment-flow)\n4. [Environment \u0026 secrets model](#4-environment--secrets-model)\n5. [Build/runtime compatibility pitfalls](#5-buildruntime-compatibility-pitfalls)\n6. [Database lifecycle](#6-database-lifecycle)\n7. [Security baseline](#7-security-baseline)\n8. [Incident response checklist](#8-incident-response-checklist)\n9. [Docker/Compose handbook templates](#9-dockercompose-handbook-templates)\n10. [Quick command templates](#10-quick-command-templates)\n\n## 1. Executive summary\n\nGoals:\n\n- **Repeatable builds**: same inputs produce the same artifact.\n- **Runtime parity**: what runs in prod matches what you tested.\n- **Controlled releases**: you know what version is live.\n- **Clear rollback**: you can go back without guessing.\n- **Security and supply chain**: handled early, not as an afterthought.\n\nStandard flow:\n\n![Standard deployment flow](/images/systems/ops-deployment-flow.svg)\n\n1. Lock source and dependencies.\n2. Build in a clean environment.\n3. Package the artifact.\n4. Transfer only required deploy assets.\n5. Deploy and run migrations.\n6. Verify health and smoke tests.\n7. Promote release or rollback.\n\n## 2. Deployment architecture patterns\n\n### 2.1 Build on the host (fast dev loop)\n\n- **Pros:** quick feedback, easy debugging.\n- **Cons:** your laptop OS/arch/libs may differ from the server, which creates \"works on my machine\" surprises.\n\n### 2.2 Build inside Docker (recommended for parity)\n\n- Build in a Linux image that matches (or is very close to) production: same distro, libc (glibc vs musl), CPU arch.\n- Use `docker build --platform ...` when the server arch differs from your laptop.\n\n### 2.3 Build on CI, promote the artifact\n\n- CI builds the image, tags it (semver or git SHA), pushes to a registry (GHCR, ECR, Harbor, etc.).\n- The server only pulls and runs, with no compiler toolchain on the VPS.\n\n### 2.4 Artifact without a registry\n\n- Use `docker save` to create a `.tar`, copy with `scp` or `rsync`, then run `docker load` on the server.\n- Good for air-gapped networks or minimal setups.\n\n### 2.5 Minimal deploy surface\n\n- Sync only what you need: compose files, scripts, env templates, optional image tar.\n- Avoid syncing the whole repo if it is not required. You get a smaller attack surface and faster transfers.\n\n## 3. Standard deployment flow\n\n### A. Prepare source and lock dependencies\n\n- Commit lockfiles (`package-lock.json`, `pnpm-lock.yaml`, `go.sum`, etc.).\n- Tag a release or at least record the exact commit you deploy.\n\n### B. Build\n\n- **Host build:** follow project README; keep build-time secrets out of production values.\n- **Docker build:** prefer multi-stage; use `.dockerignore` so you do not copy `node_modules`, `.git`, or build cache junk into the image.\n\n### C. Package\n\n- Tag images clearly (`app:1.2.3`). Optionally export tar if you skip a registry.\n\n### D. Transfer\n\n- Registry: `docker push`.\n- No registry: ship tar + compose + sample env.\n\n### E. Release\n\n- Start the database first with a **healthcheck**; wait until it is ready before starting app services that depend on it.\n- Run migrations with a strategy that matches your downtime goals (zero-downtime often needs backward-compatible migrations).\n\n### F. Verify\n\n- Health/readiness checks pass.\n- Smoke tests pass (a couple of critical paths).\n- Logs show no boot loops or repeating errors.\n\n### G. Rollback\n\n- Keep the previous image tag handy.\n- If a migration is risky, have a DB backup and a tested restore path.\n\n## 4. Environment \u0026 secrets model\n\n### 4.1 Config layers\n\n- **Platform:** DB host, port, TLS mode, often injected on the server.\n- **App:** API URLs, feature flags.\n- **Runtime:** `NODE_ENV`, worker concurrency, and similar values that change less often across environments.\n\n### 4.2 File conventions\n\n- `.env.example` lists required keys with **no real secrets**.\n- Real secrets live in a vault, a cloud secret manager, or a file on the server outside git.\n- Never commit production `.env` files.\n\n### 4.3 Rotate secrets\n\nIf you suspect a leak, rotate DB password, JWT or session secrets, and API keys. Prioritize public-facing services first.\n\n### 4.4 Changing only `.env`: do you need to rebuild the image?\n\n- **Runtime env read at container start:** you **do not** need a new image. You **do** need to **recreate** the container so it picks up new env values (Docker does not hot-reload env for a running container).\n- **Build-time variables** baked into the bundle (e.g. some `NEXT_PUBLIC_*` values): you **must** rebuild the app and image.\n\nMinimal recreate:\n\n```bash\ndocker compose -f deploy/docker-compose.yaml up -d --force-recreate web\n```\n\nCheck env inside the container:\n\n```bash\ndocker compose -f deploy/docker-compose.yaml exec web sh -c 'printenv | grep -E \"DATABASE|API|NODE\" | sort'\n```\n\n## 5. Build/runtime compatibility pitfalls\n\n### 5.1 CPU architecture mismatch\n\n- Building `arm64` and running `amd64` (or the reverse) causes errors or slow emulation.\n- **Fix:** build with the correct `--platform`, or build on CI that targets the server arch.\n\n### 5.2 glibc vs musl (Alpine)\n\n- Native binaries (ORM, crypto) may behave differently.\n- **Fix:** build and test with the same base image family you use in production.\n\n### 5.3 OpenSSL / TLS library mismatch\n\n- Do not run binaries built for macOS against Linux without rebuilding or using a compatible engine for the target.\n\n### 5.4 `node_modules` copied from the host into the image\n\n- Always exclude with `.dockerignore`.\n- Install dependencies **inside** the Dockerfile (`npm ci`).\n\n## 6. Database lifecycle\n\n- Use explicit volumes for data (bind mount or named volume).\n- Wait for the DB to be ready before import/migrate jobs.\n- Schedule backups; take a snapshot before large migrations.\n\n## 7. Security baseline\n\n### Container\n\n- Run as non-root when possible.\n- Read-only root filesystem for the app layer when it fits your app.\n- Set CPU/memory limits so one container cannot starve the node.\n\n### Edge\n\n- Reverse proxy: TLS termination, sensible timeouts, body size limits.\n- Rate limit sensitive routes (`/auth`, `/api/login`).\n\n### App\n\n- Do not execute shell commands built from raw user input.\n- Validate redirect URLs (avoid open redirects).\n- Use high-entropy secrets for sessions/JWT.\n\n### Supply chain\n\n- Lock dependencies with lockfiles.\n- Use `npm ci` (or equivalent) in CI, and avoid ad-hoc `install` on production paths.\n- Run vulnerability scans (`npm audit`, OSV) on a schedule.\n\n## 8. Incident response checklist\n\n### Warning signs\n\n- Logs suggesting RCE: `curl | sh`, `base64 -d | sh`, changes to `authorized_keys`, odd processes.\n- CPU/memory spikes that do not match real traffic.\n- Brute-force traffic or random paths.\n\n### Act fast\n\n1. Reduce public exposure (firewall / security group) if needed.\n2. Collect logs and runtime forensics (`docker inspect`, `docker diff`, process list).\n3. Compare image digest/tag with a clean CI build.\n4. Rotate secrets that might be exposed.\n5. Redeploy from a trusted source and watch closely for 24–48 hours.\n\n## 9. Docker/Compose handbook templates\n\n### 9.1 `.dockerignore`\n\n```text\n.git\n.github\n*.md\n.env\n.env.*\n!.env.example\nnode_modules\n**/node_modules\n**/dist\n**/.next/cache\ncoverage\n*.log\n```\n\n### 9.2 Dockerfile API (multi-stage)\n\n```dockerfile\nFROM node:20-bookworm-slim AS builder\nWORKDIR /app\nCOPY services/api/package.json services/api/package-lock.json* ./\nRUN npm ci --omit=dev\nCOPY services/api .\nRUN npm run build\n\nFROM node:20-bookworm-slim\nWORKDIR /app\nENV NODE_ENV=production\nCOPY --from=builder /app/package.json ./\nCOPY --from=builder /app/node_modules ./node_modules\nCOPY --from=builder /app/dist ./dist\nRUN addgroup --system app \u0026\u0026 adduser --system --ingroup app app \\\n  \u0026\u0026 chown -R app:app /app\nUSER app\nEXPOSE 4000\nCMD [\"node\", \"dist/server.js\"]\n```\n\n### 9.3 Dockerfile web static (Nginx)\n\n```dockerfile\nFROM nginx:1.27-alpine\nCOPY apps/web/dist /usr/share/nginx/html:ro\nEXPOSE 80\n```\n\n### 9.4 Docker Compose template\n\n```yaml\nname: acme-local\n\nservices:\n  db:\n    image: postgres:16-alpine\n    environment:\n      POSTGRES_USER: app\n      POSTGRES_PASSWORD: ${DB_PASSWORD}\n      POSTGRES_DB: app\n    volumes:\n      - pgdata:/var/lib/postgresql/data\n    ports:\n      - \"127.0.0.1:5432:5432\"\n    healthcheck:\n      test: [\"CMD-SHELL\", \"pg_isready -U app -d app\"]\n      interval: 5s\n      timeout: 3s\n      retries: 10\n\n  api:\n    build:\n      context: ..\n      dockerfile: deploy/Dockerfile.api\n    image: myorg/api:${APP_VERSION:-latest}\n    env_file:\n      - ../services/api/.env\n    environment:\n      DATABASE_URL: postgresql://app:${DB_PASSWORD}@db:5432/app\n      PORT: 4000\n    ports:\n      - \"127.0.0.1:4000:4000\"\n    depends_on:\n      db:\n        condition: service_healthy\n    restart: unless-stopped\n\n  web:\n    build:\n      context: ..\n      dockerfile: deploy/Dockerfile.web\n    image: myorg/web:${APP_VERSION:-latest}\n    ports:\n      - \"127.0.0.1:8080:80\"\n    depends_on:\n      - api\n    restart: unless-stopped\n\nvolumes:\n  pgdata:\n```\n\n### 9.5 Runtime env sample\n\n```bash\nDB_PASSWORD=change-me-strong\nAPP_VERSION=1.0.0\n```\n\n## 10. Quick command templates\n\n### Build and run\n\n```bash\nexport DOCKER_DEFAULT_PLATFORM=linux/amd64\ndocker compose --env-file deploy/.env -f deploy/docker-compose.yaml build --no-cache\ndocker compose --env-file deploy/.env -f deploy/docker-compose.yaml up -d\ndocker compose -f deploy/docker-compose.yaml ps -a\n```\n\n### Logs and debug\n\n```bash\ndocker compose -f deploy/docker-compose.yaml logs -f --tail=200 api web\ndocker compose -f deploy/docker-compose.yaml exec api sh -c 'printenv | sort'\ndocker compose -f deploy/docker-compose.yaml config\ndocker stats --no-stream\n```\n\n### Tar-based deploy (no registry)\n\n```bash\ndocker save -o deploy/images/api.tar myorg/api:1.0.0\ndocker save -o deploy/images/web.tar myorg/web:1.0.0\nscp deploy/images/*.tar user@vps:/opt/acme/images/\n```\n\n---\n\n## Related diagram\n\n![Docker vs Virtual Machine architecture](/images/systems/docker-vm-architecture.svg)\n"])</script><script>self.__next_f.push([1,"5:[\"$\",\"$7\",null,{\"fallback\":null,\"children\":[\"$\",\"$Le\",null,{\"posts\":[{\"slug\":\"kafka-real-systems-event-log-consumer-groups-replay\",\"title\":\"Kafka in real systems: the event log, consumer groups, and replay\",\"date\":\"2026-07-02T00:00:00.000Z\",\"excerpt\":\"Kafka is not just a queue. It is a durable event log that lets many systems react, recover, and replay. This post shows a small TypeScript setup and the production lessons from LinkedIn and Uber.\",\"tags\":[\"Kafka\",\"EventStreaming\",\"Architecture\",\"TypeScript\",\"Backend\"],\"featured\":false,\"content\":\"$f\"},{\"slug\":\"grpc-real-systems-contracts-deadlines-streaming\",\"title\":\"gRPC in real systems: contracts, deadlines, and streaming\",\"date\":\"2026-06-12T00:00:00.000Z\",\"excerpt\":\"When a service needs a fast answer, gRPC is a great fit. This post shows a small TypeScript setup, the failure modes that bite teams, and what Netflix and Uber learned at scale.\",\"tags\":[\"gRPC\",\"Microservices\",\"Architecture\",\"TypeScript\",\"Backend\"],\"featured\":false,\"content\":\"$10\"},{\"slug\":\"nextjs-vps-2gb-cicd-real-world-runbook\",\"title\":\"Next.js o
